<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management System</title>
    <meta name="description" content="Admin panel for managing product categories">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;      
            --primary-hover: #2563eb;
            --primary-light: rgba(59, 130, 246, 0.08);
            
            --success: #198754;      /* Exact Bootstrap Success Green */
            --success-hover: #157347;
            
            --danger: #dc3545;       /* Exact Bootstrap Danger Red */
            --danger-hover: #bb2d3b;
            
            --surface: #ffffff;
            --surface-alt: #f8f9fc;
            --border: #e5e7eb;
            --text: #1e293b;
            --text-muted: #64748b;
            
            --success-bg: #ecfdf5;
            --success-border: #a7f3d0;
            --success-text: #065f46;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface-alt);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
        }
        .navbar-custom .brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--success), var(--primary));
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 1.1rem;
        }

        /* ── Page Header ── */
        .page-header {
            padding: 2.5rem 0 1.5rem;
            text-align: center;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .page-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.05rem;
        }

        /* ── Card ── */
        .card-custom {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .card-custom:hover {
            box-shadow: var(--shadow-md);
        }
        .card-header-custom {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .card-header-custom i {
            color: var(--primary);
        }
        .card-body-custom {
            padding: 1.5rem;
        }

        /* ── Form ── */
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text);
            margin-bottom: 0.4rem;
        }
        .form-control {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* ── Table ── */
        .table-wrapper {
            overflow-x: auto;
        }
        .table {
            margin: 0;
        }
        .table thead th {
            background: var(--surface-alt);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
            font-size: 0.95rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .table tbody tr {
            transition: background 0.15s;
        }
        .table tbody tr:hover {
            background: var(--surface-alt);
        }

        /* Action icons */
        .btn-edit, .btn-delete {
            padding: 0.4rem 0.6rem;
            font-size: 0.95rem;
        }

        /* ── Alert Toast ── */
        .alert-toast {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 9999;
            min-width: 320px;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: var(--shadow-md);
        }
        .alert-toast.show {
            transform: translateX(0);
        }
        .alert-success-toast {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }
        .alert-error-toast {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
            display: block;
        }
        .empty-state p { 
            margin: 0; 
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* ── Loading Spinner ── */
        .spinner-wrapper {
            text-align: center;
            padding: 4rem;
        }
        .spinner-wrapper .spinner-border {
            color: var(--primary);
            width: 2.5rem;
            height: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        /* ── Margin tweaks ── */
        .form-section {
            margin-bottom: 2.5rem; 
        }

        /* Badge Style */
        .count-badge {
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            margin-left: auto;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.5rem; }
            .card-body-custom { padding: 1.15rem; }
            .form-section { margin-bottom: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container">
            <a href="#" class="brand">
                <span class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span>
                Category Management System
            </a>
        </div>
    </nav>

    <!-- Alert Toast -->
    <div id="alertToast" class="alert-toast" role="alert">
        <i id="alertIcon" class="bi"></i>
        <span id="alertMessage"></span>
    </div>

    <div class="container" style="max-width: 960px;">

        <!-- 1. Centered Page Header -->
        <div class="page-header">
            <h1>Category Management System</h1>
            <p>Create, edit, and manage your product categories</p>
        </div>

        <!-- Form Card -->
        <div class="card-custom form-section">
            <div class="card-header-custom" id="formHeader">
                <i class="bi bi-plus-circle" id="formIcon"></i>
                <span id="formTitle">Add New Category</span>
            </div>
            <div class="card-body-custom">
                <form id="categoryForm" novalidate>
                    <input type="hidden" id="categoryId">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label for="categoryName" class="form-label">Category Name <span style="color: var(--danger);">*</span></label>
                            <input type="text" class="form-control" id="categoryName" placeholder="e.g. Electronics" required>
                            <div class="invalid-feedback">Category name is required.</div>
                        </div>
                        <div class="col-md-5">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" class="form-control" id="description" placeholder="Brief description">
                        </div>
                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <!-- Button starts as green (success) native bootstrap class -->
                            <button type="submit" class="btn btn-success w-100 fw-semibold shadow-sm" id="submitBtn">
                                <i class="bi bi-plus-lg" id="submitIcon"></i>
                                <span id="submitText">Add</span>
                            </button>
                        </div>
                    </div>
                    <div id="cancelWrapper" class="mt-3" style="display: none; text-align: right;">
                        <button type="button" class="btn btn-outline-secondary btn-sm fw-semibold" onclick="resetForm()">
                            <i class="bi bi-x-lg"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card-custom mb-5">
            <div class="card-header-custom">
                <i class="bi bi-table"></i>
                <span>All Categories</span>
                <!-- 2. Dynamic Count Badge -->
                <span class="count-badge" id="countBadge">0</span>
            </div>
            
            <div class="table-wrapper">
                <!-- 4. Loading State -->
                <div id="loadingSpinner" class="spinner-wrapper">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <div class="text-muted mt-2 fw-medium">Loading...</div>
                </div>
                
                <!-- Empty State -->
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="bi bi-box-seam"></i>
                    <p>No categories available</p> 
                </div>
                
                <table class="table" id="categoryTable" style="display: none;">
                    <thead>
                        <tr>
                            <th style="width: 80px;">ID</th>
                            <th style="width: 30%;">Name</th>
                            <th>Description</th>
                            <th style="text-align: center; width: 120px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── Config ──
        const API_URL = "/categories";

        // ── DOM Elements ──
        const form = document.getElementById("categoryForm");
        const categoryIdInput = document.getElementById("categoryId");
        const categoryNameInput = document.getElementById("categoryName");
        const descriptionInput = document.getElementById("description");
        const submitBtn = document.getElementById("submitBtn");
        const submitText = document.getElementById("submitText");
        const submitIcon = document.getElementById("submitIcon");
        const formTitle = document.getElementById("formTitle");
        const formHeaderIcon = document.getElementById("formIcon");
        const cancelWrapper = document.getElementById("cancelWrapper");
        const tableBody = document.getElementById("tableBody");
        const categoryTable = document.getElementById("categoryTable");
        const loadingSpinner = document.getElementById("loadingSpinner");
        const emptyState = document.getElementById("emptyState");
        const countBadge = document.getElementById("countBadge");

        // ── Load categories on page load ──
        document.addEventListener("DOMContentLoaded", loadCategories);

        // ── Fetch & render all categories ──
        async function loadCategories() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Failed to fetch categories");

                const categories = await response.json();
                renderTable(categories);
            } catch (error) {
                showAlert("error", "Unable to load categories. Is the server running?");
                showLoading(false);
                emptyState.style.display = "block";
                categoryTable.style.display = "none";
            }
        }

        // ── Render table rows ──
        function renderTable(categories) {
            showLoading(false);
            
            // 2. Count badge handles the size dynamically
            countBadge.textContent = categories.length;

            if (categories.length === 0) {
                categoryTable.style.display = "none";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            categoryTable.style.display = "table";

            tableBody.innerHTML = categories.map((cat, index) => `
                <tr>
                    <td><strong>${index + 1}</strong></td>
                    <td class="fw-medium">${escapeHtml(cat.categoryName)}</td>
                    <td style="color: var(--text-muted);">${escapeHtml(cat.description || "—")}</td>
                    <td style="text-align: center;">
                        <!-- Update Button (Blue) -->
                        <button class="btn btn-sm btn-primary fw-semibold btn-edit shadow-sm me-1" title="Update" onclick='editCategory(${JSON.stringify(cat)})'>
                            <i class="bi bi-pencil-square"></i>
                        </button>
                        <!-- Delete Button (Red) -->
                        <button class="btn btn-sm btn-danger fw-semibold btn-delete shadow-sm" title="Delete" onclick="deleteCategory(${cat.categoryId})">
                            <i class="bi bi-trash3-fill"></i>
                        </button>
                    </td>
                </tr>
            `).join("");
        }

        // ── Form submit (Create / Update) ──
        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            // Validate
            if (!categoryNameInput.value.trim()) {
                categoryNameInput.classList.add("is-invalid");
                categoryNameInput.focus();
                return;
            }
            categoryNameInput.classList.remove("is-invalid");

            const categoryData = {
                categoryName: categoryNameInput.value.trim(),
                description: descriptionInput.value.trim()
            };

            const isUpdate = categoryIdInput.value !== "";
            const url = isUpdate ? `${API_URL}/${categoryIdInput.value}` : API_URL;
            const method = isUpdate ? "PUT" : "POST";

            try {
                // Keep UI feeling responsive with "Saving..."
                const originalText = submitText.textContent;
                submitText.textContent = "Saving...";
                submitBtn.disabled = true;

                const response = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(categoryData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Request failed");
                }

                showAlert("success", isUpdate ? "Category updated successfully!" : "Category created successfully!");
                resetForm();
                loadCategories();
            } catch (error) {
                showAlert("error", error.message || "Something went wrong.");
            } finally {
                submitBtn.disabled = false;
            }
        });

        // ── Remove invalid state on typing ──
        categoryNameInput.addEventListener("input", function () {
            if (this.value.trim()) this.classList.remove("is-invalid");
        });

        // ── Edit: fill form ──
        function editCategory(cat) {
            categoryIdInput.value = cat.categoryId;
            categoryNameInput.value = cat.categoryName;
            descriptionInput.value = cat.description || "";

            // Update UI for Edit Mode
            formTitle.textContent = "Update Category";
            formHeaderIcon.className = "bi bi-pencil-square";
            
            submitText.textContent = "Update";
            submitIcon.className = "bi bi-check-lg";
            
            // 1. Swap button class to Primary Blue
            submitBtn.classList.remove("btn-success");
            submitBtn.classList.add("btn-primary");
            
            cancelWrapper.style.display = "block";

            categoryNameInput.focus();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // ── Delete (soft) ──
        async function deleteCategory(id) {
            // Delete confirmation popup
            if (!confirm("Are you sure you want to delete this category?")) {
                return; // User clicked "Cancel", avoid fetching
            }

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: "DELETE" });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Delete failed");
                }

                showAlert("success", "Category deleted successfully!");
                loadCategories();
            } catch (error) {
                showAlert("error", error.message || "Failed to delete category.");
            }
        }

        // ── Reset form to "Add" mode ──
        function resetForm() {
            form.reset();
            categoryIdInput.value = "";
            categoryNameInput.classList.remove("is-invalid");
            
            // Revert UI to Add Mode
            formTitle.textContent = "Add New Category";
            formHeaderIcon.className = "bi bi-plus-circle";
            
            submitText.textContent = "Add";
            submitIcon.className = "bi bi-plus-lg";
            
            // 1. Swap back to Green Success 
            submitBtn.classList.remove("btn-primary");
            submitBtn.classList.add("btn-success");
            
            cancelWrapper.style.display = "none";
        }

        // ── Alert toast ──
        let alertTimeout;
        function showAlert(type, message) {
            const toast = document.getElementById("alertToast");
            const icon = document.getElementById("alertIcon");
            const msg = document.getElementById("alertMessage");

            clearTimeout(alertTimeout);
            toast.classList.remove("show", "alert-success-toast", "alert-error-toast");

            if (type === "success") {
                toast.classList.add("alert-success-toast");
                icon.className = "bi bi-check-circle-fill";
            } else {
                toast.classList.add("alert-error-toast");
                icon.className = "bi bi-exclamation-circle-fill";
            }

            msg.textContent = message;

            // Force reflow then show
            void toast.offsetWidth;
            toast.classList.add("show");

            alertTimeout = setTimeout(() => toast.classList.remove("show"), 3500);
        }

        // ── Loading state ──
        function showLoading(isLoading) {
            loadingSpinner.style.display = isLoading ? "block" : "none";
            if (isLoading) {
                categoryTable.style.display = "none";
                emptyState.style.display = "none";
            }
        }

        // ── XSS protection ──
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
