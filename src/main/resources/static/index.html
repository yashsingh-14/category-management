<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management System</title>
    <meta name="description" content="Admin panel for managing product categories">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: rgba(99, 102, 241, 0.08);
            --surface: #ffffff;
            --surface-alt: #f8f9fc;
            --border: #e5e7eb;
            --text: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success-bg: #ecfdf5;
            --success-border: #a7f3d0;
            --success-text: #065f46;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #991b1b;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--surface-alt);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar-custom {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            box-shadow: var(--shadow-sm);
        }
        .navbar-custom .brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .brand-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), #818cf8);
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: #fff;
            font-size: 1.1rem;
        }

        /* ── Page Header ── */
        .page-header {
            padding: 2rem 0 0.5rem;
        }
        .page-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .page-header p {
            color: var(--text-muted);
            margin: 0;
        }

        /* ── Card ── */
        .card-custom {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s;
        }
        .card-custom:hover {
            box-shadow: var(--shadow-md);
        }
        .card-header-custom {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 1.05rem;
        }
        .card-header-custom i {
            color: var(--primary);
        }
        .card-body-custom {
            padding: 1.5rem;
        }

        /* ── Form ── */
        .form-label {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text);
            margin-bottom: 0.35rem;
        }
        .form-control {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-size: 0.925rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .btn-primary-custom {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            font-size: 0.925rem;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary-custom:hover {
            background: var(--primary-hover);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-secondary-custom {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 1.25rem;
            font-weight: 500;
            font-size: 0.925rem;
            transition: background 0.2s;
        }
        .btn-secondary-custom:hover {
            background: var(--surface-alt);
            color: var(--text);
        }

        /* ── Table ── */
        .table-wrapper {
            overflow-x: auto;
        }
        .table {
            margin: 0;
        }
        .table thead th {
            background: var(--surface-alt);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .table tbody td {
            padding: 0.85rem 1rem;
            vertical-align: middle;
            font-size: 0.925rem;
            border-bottom: 1px solid #f1f5f9;
        }
        .table tbody tr {
            transition: background 0.15s;
        }
        .table tbody tr:hover {
            background: var(--primary-light);
        }

        .action-btn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 8px;
            display: inline-grid;
            place-items: center;
            font-size: 0.9rem;
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .btn-edit {
            background: #eff6ff;
            color: #3b82f6;
        }
        .btn-edit:hover { background: #dbeafe; }
        .btn-delete {
            background: #fef2f2;
            color: var(--danger);
        }
        .btn-delete:hover { background: #fee2e2; }

        /* ── Alert Toast ── */
        .alert-toast {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 9999;
            min-width: 320px;
            padding: 1rem 1.25rem;
            border-radius: 10px;
            font-size: 0.925rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: var(--shadow-md);
        }
        .alert-toast.show {
            transform: translateX(0);
        }
        .alert-success-toast {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }
        .alert-error-toast {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--border);
        }
        .empty-state p { margin: 0; }

        /* ── Loading Spinner ── */
        .spinner-wrapper {
            text-align: center;
            padding: 2.5rem;
        }
        .spinner-wrapper .spinner-border {
            color: var(--primary);
        }

        /* ── Badge ── */
        .count-badge {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            padding: 0.2rem 0.65rem;
            border-radius: 20px;
            margin-left: auto;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .page-header h1 { font-size: 1.3rem; }
            .card-body-custom { padding: 1.15rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="container">
            <a href="#" class="brand">
                <span class="brand-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span>
                CategoryHub
            </a>
        </div>
    </nav>

    <!-- Alert Toast -->
    <div id="alertToast" class="alert-toast" role="alert">
        <i id="alertIcon" class="bi"></i>
        <span id="alertMessage"></span>
    </div>

    <div class="container" style="max-width: 960px;">

        <!-- Page Header -->
        <div class="page-header">
            <h1><i class="bi bi-layers" style="color: var(--primary);"></i> Category Management</h1>
            <p>Create, edit, and manage your product categories</p>
        </div>

        <!-- Form Card -->
        <div class="card-custom mt-3 mb-4">
            <div class="card-header-custom">
                <i class="bi bi-plus-circle"></i>
                <span id="formTitle">Add New Category</span>
            </div>
            <div class="card-body-custom">
                <form id="categoryForm" novalidate>
                    <input type="hidden" id="categoryId">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label for="categoryName" class="form-label">Category Name <span style="color: var(--danger);">*</span></label>
                            <input type="text" class="form-control" id="categoryName" placeholder="e.g. Electronics" required>
                            <div class="invalid-feedback">Category name is required.</div>
                        </div>
                        <div class="col-md-5">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" class="form-control" id="description" placeholder="Brief description">
                        </div>
                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <button type="submit" class="btn btn-primary-custom w-100" id="submitBtn">
                                <i class="bi bi-plus-lg" id="submitIcon"></i>
                                <span id="submitText">Add</span>
                            </button>
                        </div>
                    </div>
                    <div id="cancelWrapper" class="mt-2" style="display: none;">
                        <button type="button" class="btn btn-secondary-custom btn-sm" onclick="resetForm()">
                            <i class="bi bi-x-lg"></i> Cancel Edit
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card-custom mb-5">
            <div class="card-header-custom">
                <i class="bi bi-table"></i>
                <span>All Categories</span>
                <span class="count-badge" id="countBadge">0</span>
            </div>
            <div class="table-wrapper">
                <div id="loadingSpinner" class="spinner-wrapper">
                    <div class="spinner-border" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <i class="bi bi-inbox"></i>
                    <p>No categories found. Add one above!</p>
                </div>
                <table class="table" id="categoryTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── Config ──
        const API_URL = "/categories";

        // ── DOM Elements ──
        const form = document.getElementById("categoryForm");
        const categoryIdInput = document.getElementById("categoryId");
        const categoryNameInput = document.getElementById("categoryName");
        const descriptionInput = document.getElementById("description");
        const submitBtn = document.getElementById("submitBtn");
        const submitText = document.getElementById("submitText");
        const submitIcon = document.getElementById("submitIcon");
        const formTitle = document.getElementById("formTitle");
        const cancelWrapper = document.getElementById("cancelWrapper");
        const tableBody = document.getElementById("tableBody");
        const categoryTable = document.getElementById("categoryTable");
        const loadingSpinner = document.getElementById("loadingSpinner");
        const emptyState = document.getElementById("emptyState");
        const countBadge = document.getElementById("countBadge");

        // ── Load categories on page load ──
        document.addEventListener("DOMContentLoaded", loadCategories);

        // ── Fetch & render all categories ──
        async function loadCategories() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Failed to fetch categories");

                const categories = await response.json();
                renderTable(categories);
            } catch (error) {
                showAlert("error", "Unable to load categories. Is the server running?");
                showLoading(false);
                emptyState.style.display = "block";
                categoryTable.style.display = "none";
            }
        }

        // ── Render table rows ──
        function renderTable(categories) {
            showLoading(false);
            countBadge.textContent = categories.length;

            if (categories.length === 0) {
                categoryTable.style.display = "none";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            categoryTable.style.display = "table";

            tableBody.innerHTML = categories.map(cat => `
                <tr>
                    <td><strong>${cat.categoryId}</strong></td>
                    <td>${escapeHtml(cat.categoryName)}</td>
                    <td style="color: var(--text-muted);">${escapeHtml(cat.description || "—")}</td>
                    <td style="text-align: center;">
                        <button class="action-btn btn-edit me-1" title="Edit" onclick='editCategory(${JSON.stringify(cat)})'>
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="action-btn btn-delete" title="Delete" onclick="deleteCategory(${cat.categoryId})">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>
            `).join("");
        }

        // ── Form submit (Create / Update) ──
        form.addEventListener("submit", async function (e) {
            e.preventDefault();

            // Validate
            if (!categoryNameInput.value.trim()) {
                categoryNameInput.classList.add("is-invalid");
                categoryNameInput.focus();
                return;
            }
            categoryNameInput.classList.remove("is-invalid");

            const categoryData = {
                categoryName: categoryNameInput.value.trim(),
                description: descriptionInput.value.trim()
            };

            const isUpdate = categoryIdInput.value !== "";
            const url = isUpdate ? `${API_URL}/${categoryIdInput.value}` : API_URL;
            const method = isUpdate ? "PUT" : "POST";

            try {
                const response = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(categoryData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Request failed");
                }

                showAlert("success", isUpdate ? "Category updated successfully!" : "Category created successfully!");
                resetForm();
                loadCategories();
            } catch (error) {
                showAlert("error", error.message || "Something went wrong.");
            }
        });

        // ── Remove invalid state on typing ──
        categoryNameInput.addEventListener("input", function () {
            if (this.value.trim()) this.classList.remove("is-invalid");
        });

        // ── Edit: fill form ──
        function editCategory(cat) {
            categoryIdInput.value = cat.categoryId;
            categoryNameInput.value = cat.categoryName;
            descriptionInput.value = cat.description || "";

            formTitle.textContent = "Edit Category";
            submitText.textContent = "Update";
            submitIcon.className = "bi bi-check-lg";
            cancelWrapper.style.display = "block";
            submitBtn.classList.add("btn-update-mode");

            categoryNameInput.focus();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        // ── Delete (soft) ──
        async function deleteCategory(id) {
            if (!confirm("Are you sure you want to delete this category?")) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, { method: "DELETE" });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Delete failed");
                }

                showAlert("success", "Category deleted successfully!");
                loadCategories();
            } catch (error) {
                showAlert("error", error.message || "Failed to delete category.");
            }
        }

        // ── Reset form to "Add" mode ──
        function resetForm() {
            form.reset();
            categoryIdInput.value = "";
            categoryNameInput.classList.remove("is-invalid");
            formTitle.textContent = "Add New Category";
            submitText.textContent = "Add";
            submitIcon.className = "bi bi-plus-lg";
            cancelWrapper.style.display = "none";
        }

        // ── Alert toast ──
        let alertTimeout;
        function showAlert(type, message) {
            const toast = document.getElementById("alertToast");
            const icon = document.getElementById("alertIcon");
            const msg = document.getElementById("alertMessage");

            clearTimeout(alertTimeout);
            toast.classList.remove("show", "alert-success-toast", "alert-error-toast");

            if (type === "success") {
                toast.classList.add("alert-success-toast");
                icon.className = "bi bi-check-circle-fill";
            } else {
                toast.classList.add("alert-error-toast");
                icon.className = "bi bi-exclamation-circle-fill";
            }

            msg.textContent = message;

            // Force reflow then show
            void toast.offsetWidth;
            toast.classList.add("show");

            alertTimeout = setTimeout(() => toast.classList.remove("show"), 3500);
        }

        // ── Loading state ──
        function showLoading(isLoading) {
            loadingSpinner.style.display = isLoading ? "block" : "none";
            if (isLoading) {
                categoryTable.style.display = "none";
                emptyState.style.display = "none";
            }
        }

        // ── XSS protection ──
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
